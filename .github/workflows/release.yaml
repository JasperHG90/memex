name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.10.x'
  NODE_VERSION: '22'

jobs:
  build-python:
    name: Build Python packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build all packages
        run: uv build --all-packages

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          retention-days: 30

  build-dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'packages/dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: packages/dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: packages/dashboard
        run: npm run build

      - name: Create archive
        run: tar -czf dashboard-dist.tar.gz -C packages/dashboard dist/ serve.cjs

      - name: Upload dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard-dist.tar.gz
          retention-days: 30

  build-openclaw:
    name: Build OpenClaw plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'packages/openclaw/package-lock.json'

      - name: Install dependencies
        working-directory: packages/openclaw
        run: npm ci

      - name: Build OpenClaw
        working-directory: packages/openclaw
        run: npm run build

      - name: Create archive
        run: tar -czf openclaw-dist.tar.gz -C packages/openclaw dist/

      - name: Upload OpenClaw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-dist
          path: openclaw-dist.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-python, build-dashboard, build-openclaw]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update plugin version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' packages/claude-code-plugin/.claude-plugin/plugin.json > tmp.json
          mv tmp.json packages/claude-code-plugin/.claude-plugin/plugin.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/claude-code-plugin/.claude-plugin/plugin.json
          git commit -m "chore(plugin): bump version to ${VERSION}" || true
          git push origin main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: '*-dist'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/python-dist/*
            artifacts/dashboard-dist/dashboard-dist.tar.gz
            artifacts/openclaw-dist/openclaw-dist.tar.gz

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force
