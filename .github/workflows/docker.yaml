name: Docker

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push core image
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version and image name
        id: meta
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/memex/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-mcp:
    name: Build & push MCP image
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version and image name
        id: meta
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}-mcp" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
