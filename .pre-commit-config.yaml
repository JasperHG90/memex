# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: check-toml
      - id: check-yaml
        args: [ --allow-multiple-documents ]
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.1
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.9.7
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.15.0'
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, pytest-mypy, types-PyYAML, types-aiofiles, types-cachetools, types-python-dateutil, types-Markdown]
        args: [--ignore-missing-imports, --check-untyped-defs]
        exclude: ^tests/integration/test_app\.py$

  - repo: local
    hooks:
      - id: dashboard-eslint
        name: eslint (dashboard)
        entry: bash -c 'cd packages/dashboard && npx eslint --max-warnings=0 src'
        language: system
        files: ^packages/dashboard/src/.*\.(ts|tsx)$
        pass_filenames: false
      - id: dashboard-typecheck
        name: tsc (dashboard)
        entry: bash -c 'cd packages/dashboard && npx tsc --noEmit -p tsconfig.app.json'
        language: system
        files: ^packages/dashboard/.*\.(ts|tsx)$
        pass_filenames: false
