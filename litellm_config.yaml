# LiteLLM proxy config — Gemini Flash primary, Ollama fallback
# Tier 1: Gemini Flash (fast, cheap, no VRAM pressure)
# Tier 2: Windows Ollama (local fallback if Gemini is down)
# Tier 3: Mac Ollama (meshnet fallback)
#
# Decision: Ollama demoted from primary because gemma3:12b saturates
# 16GB VRAM on Windows, blocking all other GPU workloads and causing
# system-wide sluggishness. Gemini 2.5 Flash is fast and cheap enough
# for Memex extraction/reflection workloads. — 2026-03-18

model_list:
  - model_name: "memex-default"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      description: "Tier 1: Gemini Flash (primary — fast, no VRAM)"

  - model_name: "memex-default"
    litellm_params:
      model: "ollama_chat/gemma3:12b"
      api_base: "http://host.docker.internal:11434"
      num_ctx: 6144
    model_info:
      description: "Tier 2: Windows Ollama (local fallback)"

  - model_name: "memex-default"
    litellm_params:
      model: "ollama_chat/gemma3:12b"
      api_base: "http://100.90.52.188:11434"
      num_ctx: 6144
    model_info:
      description: "Tier 3: Mac Ollama via Meshnet (fallback)"

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 3
  timeout: 300
  allowed_fails: 3
  cooldown_time: 10

general_settings:
  master_key: null
