[project]
name = "memex-common"
version = "0.0.0"
description = "Memex common provides shared utilities and components for the Memex project."
authors = [
  {name="Jasper Ginn", email="jasperginn@gmail.com"}
]
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "platformdirs>=4.5.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "python-box>=7.3.2",
    "pyyaml>=6.0.3",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
