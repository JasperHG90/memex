[project]
name = "memex-common"
dynamic = ["version"]
description = "Memex common provides shared utilities and components for the Memex project."
authors = [
  {name="Jasper Ginn", email="jasperginn@gmail.com"}
]
requires-python = ">=3.12"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    "platformdirs>=4.5.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "python-box>=7.3.2",
    "pyyaml>=6.0.3",
    "httpx>=0.27.0",
    "tomli_w>=1.0.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
raw-options.root = "../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/memex_common"]
artifacts = ["src/memex_common/prompts/*.toml"]

[tool.hatch.build.hooks.vcs]
version-file = "src/memex_common/__about__.py"
