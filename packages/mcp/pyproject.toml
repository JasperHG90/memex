[project]
name = "memex-mcp"
dynamic = ["version"]
description = "Memex MCP provides an MCP interface for the Memex API."
authors = [
  {name="Jasper Ginn", email="jasperginn@gmail.com"}
]
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "memex-common",
    "memex-core",
    "fastmcp>=2.14.4,<3.0.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0.0",
]

[tool.uv.sources]
memex-common = { workspace = true }
memex-core = { workspace = true }

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
raw-options.root = "../.."
