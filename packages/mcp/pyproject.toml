[project]
name = "memex-mcp"
dynamic = ["version"]
description = "Memex MCP provides an MCP interface for the Memex API."
authors = [
  {name="Jasper Ginn", email="jasperginn@gmail.com"}
]
requires-python = ">=3.12"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    "memex-common",
    "fastmcp>=3.1.0,<4.0.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0.0",
]

[tool.uv.sources]
memex-common = { workspace = true }

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.hooks.vcs]
version-file = "src/memex_mcp/__about__.py"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "types-aiofiles>=25.1.0.20251011",
    "types-pyyaml>=6.0.12.20250915",
]

[tool.hatch.version]
source = "vcs"
raw-options.root = "../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]
