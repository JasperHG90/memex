<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>
    <img class="logo" src="../icons/icon-48.png" alt="">
    Save to Memex
  </h1>

  <div class="field">
    <label for="title">Title</label>
    <input type="text" id="title" placeholder="Extracting...">
  </div>

  <div class="field">
    <label for="user-notes">Additional Notes (optional)</label>
    <textarea id="user-notes" rows="2" placeholder="Add your own context or commentary"></textarea>
  </div>

  <div class="field">
    <label for="vault">Vault</label>
    <select id="vault">
      <option value="">Loading vaults...</option>
    </select>
  </div>

  <div class="field">
    <label for="tags">Tags (comma-separated)</label>
    <input type="text" id="tags" placeholder="Optional">
  </div>

  <div class="field-row">
    <div class="field field-half">
      <label for="author">Author</label>
      <input type="text" id="author" placeholder="Unknown">
    </div>
    <div class="field field-half">
      <label for="publish-date">Publish Date</label>
      <input type="date" id="publish-date">
    </div>
  </div>

  <div class="preview" id="url-preview"></div>

  <div class="actions">
    <button class="primary" id="save-btn" disabled>Save</button>
  </div>

  <div id="status"></div>

  <a href="#" class="settings-link" id="open-settings">Settings</a>

  <script src="popup.js"></script>
</body>
</html>
