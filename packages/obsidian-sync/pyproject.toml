[project]
name = "memex-obsidian-sync"
dynamic = ["version"]
description = "Sync Obsidian vault notes to Memex."
authors = [
  {name="Jasper Ginn", email="jasperginn@gmail.com"}
]
requires-python = ">=3.12"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    "memex-common",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "watchdog>=4.0.0",
    "sqlmodel>=0.0.22",
    "structlog>=25.0.0",
]

[project.scripts]
obsidian-memex-sync = "memex_obsidian_sync.cli:app"

[tool.uv.sources]
memex-common = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/memex_obsidian_sync"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.hooks.vcs]
version-file = "src/memex_obsidian_sync/__about__.py"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
raw-options.root = "../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]
