[project]
name = "memex-cli"
dynamic = ["version"]
description = "Memex CLI provides command-line tools for interacting with the Memex system."
authors = [
  {name="Jasper Ginn", email="jasperginn@gmail.com"}
]
requires-python = ">=3.12"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    "memex-common",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0.1",
    "platformdirs>=4.5.1",
    "python-box>=7.3.2",
    "aiofiles>=25.1.0",
]

[project.optional-dependencies]
server = ["memex-core"]
mcp = ["memex-mcp"]

[tool.uv.sources]
memex-common = { workspace = true }
memex-core = { workspace = true }
memex-mcp = { workspace = true }

[project.scripts]
memex = "memex_cli:app"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
raw-options.root = "../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.hooks.vcs]
version-file = "src/memex_cli/__about__.py"
