[alembic]
# Path to migration scripts, relative to this file.
script_location = %(here)s/alembic

# The database URL is provided programmatically via env.py
# (reads from MemexConfig / environment variables).
# sqlalchemy.url is intentionally left blank.
sqlalchemy.url =

# Logging configuration for Alembic.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
